<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrandCars - Login</title>
    <link rel="icon" href="assets/Afavicon.png">
    <link rel="stylesheet" href="style/styleLogin.css">
</head>
<body>

    <!-- Botão de Voltar -->
    <a href="index.html" class="back-link">
        <span>&larr;</span> Voltar ao Catálogo
    </a>

    <!-- Container do Formulário de Login -->
    <div class="login-container">
        <form id="formCadastro">
            <div class="brand-logo">
                <img src="assets/AfaviconSemFundo.png" alt="GrandCars Logo">
            </div>
            <h1>Acesse sua Conta</h1>
            <p class="form-helper">Primeiro acesso? Digite seu usuário e senha. Seus dados serão cadastrados automaticamente no sistema.</p>
            
            <div class="input-group">
                <label for="login">Login</label>
                <input type="text" id="login" placeholder="Digite seu usuário" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn-submit">Entrar</button>
        </form>
    </div>

    <!-- Modal Customizado de Feedback -->
    <div id="customModal" class="modal">
        <div class="modal-content">
            <div class="modal-body">
                <div id="modalIcon" class="modal-icon">✅</div>
                <h2 id="modalTitle">Sucesso!</h2>
                <p id="modalMessage">Conta criada e login realizado com sucesso.</p>
                <button class="btn-modal" onclick="confirmarLogin()">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="scripts/loginScript.js"></script>
</body>
</html>
